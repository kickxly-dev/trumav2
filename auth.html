<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAUMA - License Activation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000000 0%, #0a0a0a 50%, #000000 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(220, 20, 60, 0.03) 2px,
                    rgba(220, 20, 60, 0.03) 4px
                );
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(20px); }
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 60px rgba(220, 20, 60, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc143c, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(220, 20, 60, 0.5);
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .auth-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(220, 20, 60, 0.1);
            border: 1px solid rgba(220, 20, 60, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #dc143c;
            margin-top: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--crimson-primary);
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: none;
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--crimson-primary), var(--crimson-dark));
            color: var(--text-primary);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(220, 20, 60, 0.4);
        }

        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-align: center;
        }

        .auth-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: var(--error-color);
        }

        .auth-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .license-info {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .license-info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .license-info-row:last-child {
            border-bottom: none;
        }

        .license-info-label {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .license-info-value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .license-info-value.active {
            color: #00ff88;
        }

        .license-info-value.expired {
            color: var(--error-color);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .auth-footer a {
            color: var(--crimson-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--crimson-glow);
        }

        .license-hint {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(220, 20, 60, 0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .license-hint code {
            background: var(--bg-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--crimson-primary);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">TRAUMA</div>
                <p class="auth-subtitle">Unified License Portal</p>
                <div class="auth-badge">
                    <span>🔑</span>
                    <span>ONE LICENSE FOR ALL TOOLS</span>
                </div>
            </div>

            <!-- Status Display -->
            <div id="licenseStatus" class="license-info hidden">
                <div class="license-info-row">
                    <span class="license-info-label">Status</span>
                    <span id="statusValue" class="license-info-value">-</span>
                </div>
                <div class="license-info-row">
                    <span class="license-info-label">User</span>
                    <span id="userValue" class="license-info-value">-</span>
                </div>
                <div class="license-info-row">
                    <span class="license-info-label">Expires</span>
                    <span id="expiresValue" class="license-info-value">-</span>
                </div>
            </div>

            <!-- Message Display -->
            <div id="authMessage" class="auth-message hidden"></div>

            <!-- License Form -->
            <form id="licenseForm">
                <div class="form-group">
                    <label class="form-label" for="licenseKey">TRAUMA License Key</label>
                    <input type="text" id="licenseKey" class="form-input" 
                           placeholder="TRUMA-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX"
                           maxlength="34" autocomplete="off" spellcheck="false">
                </div>
                
                <button type="submit" class="auth-button" id="activateBtn">
                    <span id="btnText">Activate License</span>
                </button>
            </form>

            <div class="license-hint">
                <strong>Format:</strong> <code>TRUMA-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX</code><br>
                <small>Your license works across all TRAUMA tools: OSINT, Browser, Python Suite, and Web Tools.</small>
            </div>

            <div class="auth-footer">
                <p><a href="index.html">← Back to TRAUMA Suite</a></p>
                <p style="margin-top: 1rem; color: var(--text-dim); font-size: 0.8rem;">
                    Need a license? Contact us on Discord
                </p>
            </div>
        </div>
    </div>

    <script>
        // TRAUMA Unified License System (Browser Version)
        const TRAUMA_SECRET = 'TRUMA-OSINT-SECRET-2024-SECURE-KEY-DO-NOT-SHARE';
        
        // Storage key
        const LICENSE_KEY = 'trauma_license';

        // Get stored license
        function getStoredLicense() {
            try {
                const data = localStorage.getItem(LICENSE_KEY);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                return null;
            }
        }

        // Save license
        function saveLicense(data) {
            localStorage.setItem(LICENSE_KEY, JSON.stringify(data));
        }

        // Clear license
        function clearLicense() {
            localStorage.removeItem(LICENSE_KEY);
        }

        // Verify license format
        function verifyLicenseFormat(key) {
            if (!key || typeof key !== 'string') {
                return { valid: false, error: 'No license key provided' };
            }

            const parts = key.split('-');
            if (parts.length !== 7 || parts[0] !== 'TRUMA') {
                return { valid: false, error: 'Invalid license format' };
            }

            const signature = parts.slice(1).join('');
            if (signature.length !== 24 || !/^[A-Z0-9]+$/.test(signature)) {
                return { valid: false, error: 'Invalid license signature' };
            }

            return { valid: true };
        }

        // Check license status
        function checkLicense() {
            const license = getStoredLicense();
            
            if (!license) {
                return { valid: false, error: 'No license activated', needsActivation: true };
            }

            const formatCheck = verifyLicenseFormat(license.key);
            if (!formatCheck.valid) {
                return { valid: false, error: 'Invalid stored license' };
            }

            // Check expiry
            const expiry = new Date(license.expires);
            if (expiry < new Date()) {
                return { valid: false, error: 'License expired', expired: true, expires: license.expires };
            }

            return {
                valid: true,
                user: license.user || 'Licensed User',
                expires: license.expires,
                created: license.created
            };
        }

        // Activate license
        function activateLicense(key) {
            const formatCheck = verifyLicenseFormat(key);
            if (!formatCheck.valid) {
                return { success: false, error: formatCheck.error };
            }

            // Create license data
            const now = new Date();
            const expiry = new Date(now.getTime() + (365 * 24 * 60 * 60 * 1000)); // 1 year

            const licenseData = {
                key: key,
                user: 'Licensed User',
                created: now.toISOString(),
                expires: expiry.toISOString(),
                activated: now.getTime()
            };

            saveLicense(licenseData);

            return {
                success: true,
                message: 'License activated successfully!',
                user: licenseData.user,
                expires: licenseData.expires
            };
        }

        // Deactivate license
        function deactivateLicense() {
            clearLicense();
            return { success: true, message: 'License deactivated' };
        }

        // UI Functions
        function showMessage(text, isError = false) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = text;
            msgEl.className = 'auth-message ' + (isError ? 'auth-error' : 'auth-success');
            msgEl.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('authMessage').classList.add('hidden');
        }

        function updateStatusDisplay(result) {
            const statusEl = document.getElementById('licenseStatus');
            const statusValue = document.getElementById('statusValue');
            const userValue = document.getElementById('userValue');
            const expiresValue = document.getElementById('expiresValue');

            if (result.valid) {
                statusEl.classList.remove('hidden');
                statusValue.textContent = '✓ Active';
                statusValue.className = 'license-info-value active';
                userValue.textContent = result.user;
                const expDate = new Date(result.expires);
                expiresValue.textContent = expDate.toLocaleDateString();
                expiresValue.className = 'license-info-value';
            } else if (result.expired) {
                statusEl.classList.remove('hidden');
                statusValue.textContent = '✗ Expired';
                statusValue.className = 'license-info-value expired';
                userValue.textContent = '-';
                expiresValue.textContent = new Date(result.expires).toLocaleDateString();
                expiresValue.className = 'license-info-value expired';
            } else {
                statusEl.classList.add('hidden');
            }
        }

        function updateButtonText(text, loading = false) {
            const btn = document.getElementById('btnText');
            btn.innerHTML = (loading ? '<span class="loading-spinner"></span>' : '') + text;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('licenseForm');
            const input = document.getElementById('licenseKey');
            const btn = document.getElementById('activateBtn');

            // Check current license status
            const status = checkLicense();
            updateStatusDisplay(status);

            if (status.valid) {
                updateButtonText('Deactivate License');
                input.placeholder = 'License active';
                input.disabled = true;
            }

            // Form submission
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                hideMessage();

                const currentStatus = checkLicense();

                if (currentStatus.valid) {
                    // Deactivate
                    deactivateLicense();
                    showMessage('License deactivated. You can activate a new one.');
                    updateStatusDisplay({ valid: false });
                    updateButtonText('Activate License');
                    input.disabled = false;
                    input.value = '';
                    input.placeholder = 'TRUMA-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX';
                } else {
                    // Activate
                    const key = input.value.trim().toUpperCase();
                    
                    if (!key) {
                        showMessage('Please enter a license key', true);
                        return;
                    }

                    updateButtonText('Activating...', true);
                    btn.disabled = true;

                    setTimeout(() => {
                        const result = activateLicense(key);
                        
                        if (result.success) {
                            showMessage(result.message);
                            updateStatusDisplay(checkLicense());
                            updateButtonText('Deactivate License');
                            input.disabled = true;
                        } else {
                            showMessage(result.error, true);
                            updateButtonText('Activate License');
                        }
                        
                        btn.disabled = false;
                    }, 500);
                }
            });

            // Format input
            input.addEventListener('input', (e) => {
                let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                
                // Add dashes
                if (value.length > 5) {
                    value = 'TRUMA-' + value.substring(5);
                }
                
                // Format with dashes every 4 chars after TRUMA-
                if (value.startsWith('TRUMA-')) {
                    const parts = ['TRUMA'];
                    const rest = value.substring(6);
                    for (let i = 0; i < rest.length && i < 24; i += 4) {
                        parts.push(rest.substring(i, i + 4));
                    }
                    value = parts.join('-');
                }
                
                e.target.value = value;
            });
        });

        // Export for other pages
        window.TRAUMALicense = {
            check: checkLicense,
            activate: activateLicense,
            deactivate: deactivateLicense,
            getStored: getStoredLicense
        };
    </script>
</body>
</html>
