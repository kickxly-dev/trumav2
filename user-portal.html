<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAUMA User Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --card: #111;
            --border: #222;
            --text: #fff;
            --muted: #666;
            --crimson: #dc143c;
            --green: #00ff88;
            --blue: #0088ff;
            --yellow: #ffaa00;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--crimson), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: var(--muted);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--crimson);
        }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--crimson), #8b0000);
            border: none;
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(220, 20, 60, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--border);
            margin-top: 1rem;
        }
        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }
        .success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--green);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }
        .license-info {
            display: none;
        }
        .license-info.active {
            display: block;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .info-item {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .info-item .label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        .info-item .value {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .info-item .value.green { color: var(--green); }
        .info-item .value.yellow { color: var(--yellow); }
        .info-item .value.red { color: #ff4444; }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .tab.active {
            background: var(--crimson);
            color: var(--text);
            border-color: var(--crimson);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .referral-input {
            display: flex;
            gap: 0.5rem;
        }
        .referral-input input {
            flex: 1;
        }
        .referral-input button {
            padding: 1rem 1.5rem;
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--crimson);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>TRAUMA Portal</h1>
                <p>Manage your license and access tools</p>
            </div>

            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <!-- Login/Verify Tab -->
            <div id="verify-tab" class="tab-content active">
                <div class="form-group">
                    <label>License Key</label>
                    <input type="text" id="license-key" placeholder="TRUMA-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX" style="text-transform: uppercase;">
                </div>
                <button class="btn" onclick="verifyLicense()">Verify License</button>
            </div>

            <!-- License Info (shown after verification) -->
            <div id="license-info" class="license-info">
                <div class="tabs">
                    <div class="tab active" onclick="showTab('status')">Status</div>
                    <div class="tab" onclick="showTab('extend')">Extend</div>
                    <div class="tab" onclick="showTab('tools')">Tools</div>
                </div>

                <div id="status-content" class="tab-content active">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Status</div>
                            <div class="value green" id="status-value">● Active</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Days Left</div>
                            <div class="value green" id="days-value">365</div>
                        </div>
                        <div class="info-item">
                            <div class="label">User</div>
                            <div class="value" id="user-value">-</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Expires</div>
                            <div class="value" id="expires-value">-</div>
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="logout()">Logout</button>
                </div>

                <div id="extend-content" class="tab-content">
                    <div class="form-group">
                        <label>Referral Code</label>
                        <div class="referral-input">
                            <input type="text" id="referral-code" placeholder="Enter referral code">
                            <button onclick="useReferral()">Apply</button>
                        </div>
                    </div>
                    <p style="color: var(--muted); font-size: 0.9rem; margin-top: 1rem;">
                        Referral codes extend your license by bonus days. Get codes from friends or promotions!
                    </p>
                </div>

                <div id="tools-content" class="tab-content">
                    <div class="info-grid">
                        <a href="../index.html" class="info-item" style="text-decoration: none;">
                            <div class="label">Web Tools</div>
                            <div class="value">🌐</div>
                        </a>
                        <a href="../TRUMA-Browser/index.html" class="info-item" style="text-decoration: none;">
                            <div class="label">Browser</div>
                            <div class="value">🔍</div>
                        </a>
                        <a href="../TRUMA-Cleaner/index.html" class="info-item" style="text-decoration: none;">
                            <div class="label">Cleaner</div>
                            <div class="value">🧹</div>
                        </a>
                        <a href="../license-server/dashboard.html" class="info-item" style="text-decoration: none;">
                            <div class="label">Dashboard</div>
                            <div class="value">📊</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = localStorage.getItem('trauma_license_server') || 'http://localhost:3001';
        
        // Check for stored license on load
        document.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('trauma_license');
            if (stored) {
                const license = JSON.parse(stored);
                if (license.key) {
                    document.getElementById('license-key').value = license.key;
                    verifyLicense(true);
                }
            }
        });

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}-content`).classList.add('active');
        }

        async function verifyLicense(silent = false) {
            const key = document.getElementById('license-key').value.trim().toUpperCase();
            
            if (!key) {
                showError('Please enter a license key');
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/license/validate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, tool: 'portal' })
                });
                
                const result = await response.json();
                
                if (result.valid) {
                    // Store license
                    localStorage.setItem('trauma_license', JSON.stringify({
                        key,
                        user: result.user,
                        expires: result.expires,
                        daysRemaining: result.daysRemaining
                    }));
                    
                    // Update UI
                    document.getElementById('verify-tab').classList.remove('active');
                    document.getElementById('license-info').classList.add('active');
                    
                    document.getElementById('user-value').textContent = result.user;
                    document.getElementById('days-value').textContent = result.daysRemaining;
                    document.getElementById('expires-value').textContent = new Date(result.expires).toLocaleDateString();
                    
                    // Color coding
                    const daysEl = document.getElementById('days-value');
                    const statusEl = document.getElementById('status-value');
                    
                    if (result.daysRemaining > 30) {
                        daysEl.className = 'value green';
                        statusEl.textContent = '● Active';
                        statusEl.className = 'value green';
                    } else if (result.daysRemaining > 7) {
                        daysEl.className = 'value yellow';
                        statusEl.textContent = '● Expiring Soon';
                        statusEl.className = 'value yellow';
                    } else {
                        daysEl.className = 'value red';
                        statusEl.textContent = '● Critical';
                        statusEl.className = 'value red';
                    }
                    
                    showSuccess('License verified successfully!');
                } else {
                    showError(result.error || 'Invalid license');
                }
            } catch (e) {
                showError('Server unreachable. Check if license server is running.');
            }
        }

        async function useReferral() {
            const code = document.getElementById('referral-code').value.trim();
            const stored = localStorage.getItem('trauma_license');
            
            if (!stored) {
                showError('No active license');
                return;
            }
            
            const license = JSON.parse(stored);
            
            try {
                const response = await fetch(`${SERVER_URL}/api/referral/use`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, key: license.key })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(`License extended by ${result.bonusDays} days!`);
                    // Re-verify to update info
                    verifyLicense(true);
                } else {
                    showError(result.error || 'Invalid referral code');
                }
            } catch (e) {
                showError('Server unreachable');
            }
        }

        function logout() {
            localStorage.removeItem('trauma_license');
            document.getElementById('license-info').classList.remove('active');
            document.getElementById('verify-tab').classList.add('active');
            document.getElementById('license-key').value = '';
            hideMessages();
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            document.getElementById('success').textContent = msg;
            document.getElementById('success').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }
    </script>
</body>
</html>
